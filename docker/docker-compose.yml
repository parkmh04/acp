name: acp
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: acp-postgres
    environment:
      POSTGRES_DB: acp
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 최초 기동 시 스키마/테이블 자동 생성 (jOOQ codegen 및 앱 기동 전제)
      - ./initdb:/docker-entrypoint-initdb.d:ro
      - ../acp-merchant/src/main/resources/db/migration:/migrations/merchant:ro
      - ../acp-psp/src/main/resources/db/migration:/migrations/psp:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d acp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: acp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
