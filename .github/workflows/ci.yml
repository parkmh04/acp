name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Start infra (PostgreSQL + Redis, auto-creates schema)
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait for PostgreSQL healthy
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect -f '{{.State.Health.Status}}' acp-postgres 2>/dev/null || echo starting)
            echo "postgres health: $status"
            [ "$status" = "healthy" ] && exit 0
            sleep 3
          done
          echo "PostgreSQL did not become healthy in time" >&2
          docker logs acp-postgres || true
          exit 1

      - name: Build & test
        run: ./gradlew clean build --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/**"
          if-no-files-found: ignore

      - name: Tear down infra
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
